<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-wenco CRM</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23524F4F'/%3E%3Ctext x='4' y='24' font-family='sans-serif' font-weight='800' font-size='20' fill='%2394C11F'%3Eew%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Brand */
  --ew-verde:       #94C11F;
  --ew-grigio:      #524F4F;
  /* Palette estesa */
  --ew-verde-dark:  #6E9116;
  --ew-verde-light: #D6EDAB;
  --ew-verde-xlight:#EFF8D9;
  --ew-verde-ghost: #F7FCF0;
  --ew-grigio-mid:  #857F7F;
  --ew-grigio-light:#C4BFBF;
  --ew-grigio-xlight:#EEECEC;
  --ew-grigio-ghost:#F6F5F5;
  /* Sfondi */
  --bg:       #F4F3F1;
  --bg-card:  #FFFFFF;
  /* Testo */
  --txt:      #2A2828;
  --txt-mid:  #524F4F;
  --txt-soft: #857F7F;
  --txt-faint:#B5B0B0;
  /* Stato */
  --red:        #C0392B;
  --red-light:  #FDECEA;
  --orange:     #D4770A;
  --orange-light:#FEF3E2;
  --blue:       #2563EB;
  --blue-light: #EFF6FF;
  --purple:     #7C3AED;
  --purple-light:#F5F3FF;
  /* Shadows */
  --sh-xs: 0 1px 2px rgba(82,79,79,.06);
  --sh-sm: 0 2px 6px rgba(82,79,79,.08);
  --sh-md: 0 6px 18px rgba(82,79,79,.10);
  --sh-lg: 0 16px 40px rgba(82,79,79,.14);
  /* Radii */
  --r: 10px; --rsm: 6px; --rlg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); font-size: 14px; line-height: 1.5; }

/* ── Toast ── */
#toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:var(--r); font-size:13px; font-weight:600; z-index:9999; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; max-width:380px; }
#toast.show { opacity:1; transform:translateY(0); }
#toast.tok { background:var(--txt); color:#fff; }
#toast.terr { background:var(--red); color:#fff; }
#toast.twarn { background:var(--orange); color:#fff; }

/* ── Login ── */
#lp { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
.lcard { background:#fff; border-radius:var(--rlg); padding:44px 40px; width:100%; max-width:420px; box-shadow:var(--sh-lg); border:1px solid var(--ew-grigio-xlight); }
.llogo { display:flex; justify-content:center; margin-bottom:28px; }
.llogo img { height:42px; }
.lsub { text-align:center; font-size:13px; color:var(--txt-soft); margin-bottom:28px; }
.lfield { margin-bottom:16px; }
.lfield label { display:block; font-size:11px; font-weight:700; color:var(--txt-mid); letter-spacing:.6px; text-transform:uppercase; margin-bottom:6px; }
.lfield input { width:100%; padding:11px 14px; border:1.5px solid var(--ew-grigio-xlight); border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:14px; color:var(--txt); outline:none; transition:border-color .2s; background:#fff; }
.lfield input:focus { border-color:var(--ew-verde); }
.lbtn { width:100%; padding:12px; background:var(--ew-verde); color:#fff; border:none; border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .2s; }
.lbtn:hover { opacity:.88; }
.lerr { background:var(--red-light); color:var(--red); border-radius:var(--rsm); padding:10px 14px; font-size:13px; margin-top:14px; display:none; }

/* ── App shell ── */
#app { display:none; flex-direction:column; min-height:100vh; }
#topbar { background:#fff; border-bottom:1px solid var(--ew-grigio-xlight); padding:0 28px; position:sticky; top:0; z-index:100; box-shadow:var(--sh-xs); }
#tb-top { height:54px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--ew-grigio-ghost); }
#tb-logo img { height:30px; }
#tb-right { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--txt-soft); }
#tb-user { font-weight:700; color:var(--txt-mid); }
#tb-role { background:var(--ew-verde-xlight); color:var(--ew-verde-dark); padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; }
#lout { background:none; border:1px solid var(--ew-grigio-xlight); border-radius:var(--rsm); padding:5px 12px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:var(--txt-soft); cursor:pointer; transition:all .2s; }
#lout:hover { border-color:var(--red); color:var(--red); }
#tb-nav { height:42px; display:flex; align-items:stretch; overflow-x:auto; gap:2px; }
.tnb { display:flex; align-items:center; gap:6px; padding:0 14px; font-size:12px; font-weight:600; color:var(--txt-soft); cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; letter-spacing:.2px; border-bottom:2.5px solid transparent; transition:all .17s; text-transform:uppercase; white-space:nowrap; }
.tnb:hover { color:var(--txt-mid); border-bottom-color:var(--ew-grigio-light); }
.tnb.active { color:var(--ew-verde-dark); border-bottom-color:var(--ew-verde); }
.tnb .badge { background:var(--ew-verde); color:#fff; border-radius:20px; padding:1px 7px; font-size:10px; font-weight:800; }

main#main { flex:1; padding:28px 32px; }
.page-wrap { max-width:1380px; margin:0 auto; }
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:22px; font-weight:800; color:var(--txt); }
.page-subtitle { font-size:13px; color:var(--txt-soft); margin-top:2px; }

/* ── Cards & Stats ── */
.card { background:#fff; border:1px solid var(--ew-grigio-xlight); border-radius:var(--r); box-shadow:var(--sh-xs); padding:20px; }
.card-title { font-size:12px; font-weight:700; color:var(--txt-mid); text-transform:uppercase; letter-spacing:.6px; margin-bottom:16px; }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card { background:#fff; border:1px solid var(--ew-grigio-xlight); border-radius:var(--r); padding:18px 20px; box-shadow:var(--sh-xs); transition:box-shadow .2s; }
.stat-card:hover { box-shadow:var(--sh-sm); }
.stat-val { font-size:28px; font-weight:800; color:var(--txt); }
.stat-lbl { font-size:11px; color:var(--txt-soft); font-weight:600; letter-spacing:.4px; text-transform:uppercase; margin-top:2px; }
.stat-accent { display:inline-block; width:3px; height:28px; border-radius:2px; background:var(--ew-verde); margin-right:10px; vertical-align:middle; }

/* ── Buttons ── */
.btn { padding:8px 16px; border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all .18s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.btn-primary { background:var(--ew-verde); color:#fff; }
.btn-primary:hover { background:var(--ew-verde-dark); }
.btn-primary:disabled { opacity:.45; cursor:not-allowed; }
.btn-secondary { background:#fff; color:var(--txt-mid); border:1.5px solid var(--ew-grigio-xlight); }
.btn-secondary:hover { border-color:var(--ew-grigio-light); background:var(--ew-grigio-ghost); }
.btn-danger { background:var(--red-light); color:var(--red); border:1px solid #f5c0bb; }
.btn-danger:hover { background:var(--red); color:#fff; }
.btn-sm { padding:5px 11px; font-size:12px; }
.btn-ghost { background:none; border:none; color:var(--txt-soft); padding:4px 8px; }
.btn-ghost:hover { background:var(--ew-grigio-ghost); color:var(--txt); }

/* ── Forms ── */
.fg { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.fl { font-size:11px; font-weight:700; color:var(--txt-mid); text-transform:uppercase; letter-spacing:.5px; }
.fi, .fse, .fta { padding:9px 12px; border:1.5px solid var(--ew-grigio-xlight); border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:13.5px; color:var(--txt); background:#fff; outline:none; transition:border-color .17s, box-shadow .17s; width:100%; }
.fi:focus, .fse:focus, .fta:focus { border-color:var(--ew-verde); box-shadow:0 0 0 3px rgba(148,193,31,.12); }
.fta { resize:vertical; min-height:80px; line-height:1.55; }
.fse { cursor:pointer; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.frow.full { grid-template-columns:1fr; }
.frow.three { grid-template-columns:1fr 1fr 1fr; }
.fgroup { display:flex; flex-direction:column; gap:5px; }
.fgroup label { font-size:11px; font-weight:700; color:var(--txt-mid); text-transform:uppercase; letter-spacing:.4px; }
.fgroup input, .fgroup select, .fgroup textarea { width:100%; padding:9px 12px; border:1.5px solid var(--ew-grigio-xlight); border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:13px; color:var(--txt); background:#fff; outline:none; transition:border-color .17s; }
.fgroup input:focus, .fgroup select:focus, .fgroup textarea:focus { border-color:var(--ew-verde); box-shadow:0 0 0 3px rgba(148,193,31,.12); }
.fgroup textarea { resize:vertical; min-height:80px; line-height:1.55; }

/* ── Toolbar ── */
.toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.toolbar input[type=text], .toolbar input[type=search], .toolbar select { padding:7px 12px; border:1.5px solid var(--ew-grigio-xlight); border-radius:var(--rsm); font-family:'DM Sans',sans-serif; font-size:13px; color:var(--txt); background:#fff; outline:none; transition:border-color .17s; }
.toolbar input:focus, .toolbar select:focus { border-color:var(--ew-verde); }

/* ── Table ── */
.tbl-wrap { overflow-x:auto; border-radius:var(--r); border:1px solid var(--ew-grigio-xlight); }
table { width:100%; border-collapse:collapse; background:#fff; }
thead th { background:var(--ew-grigio-ghost); padding:10px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--txt-mid); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--ew-grigio-xlight); white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--ew-grigio-ghost); transition:background .12s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--ew-verde-ghost); }
tbody td { padding:10px 14px; font-size:13px; color:var(--txt-mid); vertical-align:middle; }

/* ── Badges ── */
.badge-stato { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.s-prospect      { background:var(--ew-verde-xlight); color:var(--ew-verde-dark); }
.s-in_trattativa { background:var(--orange-light); color:var(--orange); }
.s-cliente       { background:#dcfce7; color:#16a34a; }
.s-perso         { background:var(--red-light); color:var(--red); }
.s-non_interessato { background:var(--ew-grigio-xlight); color:var(--txt-soft); }
.badge-priorita { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
.p-urgente { background:#fee2e2; color:#dc2626; }
.p-alta    { background:var(--orange-light); color:var(--orange); }
.p-normale { background:var(--ew-verde-xlight); color:var(--ew-verde-dark); }
.p-bassa   { background:var(--ew-grigio-ghost); color:var(--txt-soft); }
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
.d-prospect { background:var(--ew-verde); }
.d-in_trattativa { background:var(--orange); }
.d-cliente { background:#16a34a; }
.d-perso { background:var(--red); }
.d-non_interessato { background:var(--ew-grigio-light); }

/* ── Modal ── */
#modal-overlay { position:fixed; inset:0; background:rgba(82,79,79,.5); z-index:500; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px); }
#modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:var(--rlg); box-shadow:var(--sh-lg); width:100%; max-width:660px; max-height:92vh; display:flex; flex-direction:column; }
.modal-lg { max-width:880px; }
.modal-xl { max-width:1060px; }
.modal-head { padding:20px 24px 16px; border-bottom:1px solid var(--ew-grigio-xlight); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.modal-head h3 { font-size:16px; font-weight:800; color:var(--txt); }
.modal-close { background:none; border:none; font-size:20px; color:var(--txt-soft); cursor:pointer; padding:2px 6px; border-radius:4px; line-height:1; }
.modal-close:hover { background:var(--ew-grigio-ghost); }
.modal-body { padding:24px; overflow-y:auto; flex:1; }
.modal-foot { padding:16px 24px; border-top:1px solid var(--ew-grigio-xlight); display:flex; justify-content:flex-end; gap:10px; flex-shrink:0; }

/* ── Tabs ── */
.tabs { display:flex; border-bottom:2px solid var(--ew-grigio-xlight); margin-bottom:20px; }
.tab { padding:10px 18px; font-size:13px; font-weight:600; color:var(--txt-soft); cursor:pointer; border-bottom:2.5px solid transparent; margin-bottom:-2px; transition:all .18s; white-space:nowrap; }
.tab:hover { color:var(--txt-mid); }
.tab.active { color:var(--ew-verde-dark); border-bottom-color:var(--ew-verde); }

/* ── Azienda scheda ── */
.az-header { display:flex; align-items:flex-start; gap:16px; padding:20px 24px; border-bottom:1px solid var(--ew-grigio-xlight); }
.az-avatar { width:52px; height:52px; border-radius:var(--r); background:var(--ew-verde-xlight); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; color:var(--ew-verde-dark); flex-shrink:0; }
.az-title { font-size:20px; font-weight:800; color:var(--txt); line-height:1.2; }
.az-sub { font-size:13px; color:var(--txt-soft); margin-top:4px; }
.az-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.az-chip { background:var(--ew-grigio-ghost); border:1px solid var(--ew-grigio-xlight); border-radius:20px; padding:3px 12px; font-size:12px; font-weight:600; color:var(--txt-mid); display:inline-flex; align-items:center; gap:5px; }

/* ── Timeline / Operazioni ── */
.tl-item { display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--ew-grigio-ghost); }
.tl-item:last-child { border-bottom:none; }
.tl-dot { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:2px; }
.tl-dot.email    { background:var(--blue-light); }
.tl-dot.tel      { background:var(--ew-verde-xlight); }
.tl-dot.incontro { background:var(--purple-light); }
.tl-dot.nota     { background:var(--ew-grigio-ghost); }
.tl-dot.preventivo { background:var(--orange-light); }
.tl-tipo { font-size:13px; font-weight:700; color:var(--txt); }
.tl-det  { font-size:13px; color:var(--txt-mid); margin-top:3px; white-space:pre-wrap; }
.tl-meta { font-size:11px; color:var(--txt-faint); margin-top:4px; }

/* ── Prossime Azioni ── */
.azione-card { background:#fff; border:1px solid var(--ew-grigio-xlight); border-radius:var(--r); padding:14px 18px; display:flex; align-items:flex-start; gap:14px; box-shadow:var(--sh-xs); transition:box-shadow .18s; margin-bottom:10px; }
.azione-card:hover { box-shadow:var(--sh-sm); }
.azione-card.scaduta { border-left:3px solid var(--red); }
.azione-card.urgente { border-left:3px solid var(--orange); }
.azione-card.ok      { border-left:3px solid var(--ew-verde); }
.ac-tipo { font-size:13px; font-weight:700; color:var(--txt); }
.ac-azienda { font-size:12px; color:var(--ew-verde-dark); font-weight:600; margin-top:2px; }
.ac-data { font-size:12px; color:var(--txt-soft); margin-top:3px; }
.ac-note { font-size:12px; color:var(--txt-mid); margin-top:5px; font-style:italic; }

/* ── Contatti ── */
.contatto-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--ew-grigio-ghost); }
.contatto-row:last-child { border-bottom:none; }
.ct-avatar { width:36px; height:36px; border-radius:50%; background:var(--ew-verde-xlight); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--ew-verde-dark); flex-shrink:0; }
.ct-nome { font-size:13px; font-weight:700; color:var(--txt); }
.ct-ruolo { font-size:12px; color:var(--txt-soft); }
.ct-email { font-size:12px; color:var(--blue); }

/* ── Settings ── */
.setting-row { display:flex; align-items:flex-start; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--ew-grigio-ghost); gap:20px; }
.setting-row:last-child { border-bottom:none; }
.setting-lbl { font-size:13px; font-weight:700; color:var(--txt); }
.setting-desc { font-size:12px; color:var(--txt-soft); margin-top:2px; }
.key-input { font-family:'DM Mono',monospace; font-size:12px; width:240px; background:var(--ew-grigio-ghost); padding:7px 10px; border:1.5px solid var(--ew-grigio-xlight); border-radius:var(--rsm); }
.key-input.saved { border-color:var(--ew-verde); background:var(--ew-verde-ghost); }

/* ── Info / Warn boxes ── */
.info-box { background:var(--ew-verde-ghost); border:1px solid var(--ew-verde-light); border-radius:var(--r); padding:12px 16px; font-size:13px; color:var(--ew-verde-dark); margin-bottom:16px; }
.warn-box { background:var(--orange-light); border:1px solid #f5c28a; border-radius:var(--r); padding:12px 16px; font-size:13px; color:#7a3800; margin-bottom:16px; }
.empty { text-align:center; padding:52px 20px; color:var(--txt-soft); }
.empty .ei { font-size:40px; margin-bottom:12px; }
.empty p { font-size:14px; font-weight:600; }
.empty small { font-size:12px; color:var(--txt-faint); display:block; margin-top:6px; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--ew-grigio-xlight); border-top-color:var(--ew-verde); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Utenti ── */
.user-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--ew-grigio-ghost); }
.user-row:last-child { border-bottom:none; }
.user-av { width:36px; height:36px; border-radius:50%; background:var(--ew-verde-xlight); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:var(--ew-verde-dark); flex-shrink:0; }

@media(max-width:768px) {
  main#main { padding:16px; }
  .frow { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="lp">
  <div class="lcard">
    <div class="llogo">
      <svg height="36" viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="46" font-family="DM Sans,sans-serif" font-weight="800" font-size="48" fill="#524F4F">e</text>
        <text x="36" y="46" font-family="DM Sans,sans-serif" font-weight="800" font-size="48" fill="#94C11F">-wenco</text>
        <text x="0" y="58" font-family="DM Sans,sans-serif" font-weight="400" font-size="11" letter-spacing="3" fill="#857F7F">CRM</text>
      </svg>
    </div>
    <div class="lsub">Accesso riservato al personale autorizzato</div>
    <div id="lerr" class="lerr"></div>
    <div class="lfield"><label>E-Mail</label><input type="email" id="lemail" placeholder="nome@e-wenco.it" autocomplete="username"/></div>
    <div class="lfield"><label>Password</label><input type="password" id="lpwd" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="lbtn" id="lbtn-login">Accedi</button>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <div id="topbar">
    <div id="tb-top">
      <div id="tb-logo">
        <svg height="26" viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="46" font-family="DM Sans,sans-serif" font-weight="800" font-size="48" fill="#524F4F">e</text>
          <text x="36" y="46" font-family="DM Sans,sans-serif" font-weight="800" font-size="48" fill="#94C11F">-wenco</text>

// API HELPER
// ═══════════════════════════════════════════════════════
async function db(method, table, opts={}){
  const { flt='', body=null, sel='*', ord='', lim='' } = opts;
  let url = `${CFG.URL}/rest/v1/${table}?select=${sel}`;
  if(flt) url += `&${flt}`;
  if(ord) url += `&order=${ord}`;
  if(lim) url += `&limit=${lim}`;
  const headers = {
    'apikey': CFG.KEY,
    'Authorization': `Bearer ${S.token||CFG.KEY}`,
    'Content-Type': 'application/json',
    'Prefer': method==='POST'?'return=representation':''
  };
  const res = await fetch(url, { method, headers, body: body?JSON.stringify(body):undefined });
  if(!res.ok){ const e=await res.text(); throw new Error(`${method} ${table}: ${e}`); }
  if(res.status===204) return true;
  return res.json();
}

async function supaAuth(email, pwd){
  const res = await fetch(`${CFG.URL}/auth/v1/token?grant_type=password`, {
    method:'POST',
    headers: { 'apikey':CFG.KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({ email, password:pwd })
  });
  return res.json();
}

async function callFn(name, payload){
  const res = await fetch(`${CFG.FN}/${name}`, {
    method:'POST',
    headers: { 'Authorization':`Bearer ${S.token}`, 'Content-Type':'application/json' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function doLogin(){
  const email=$('lemail').value.trim(), pwd=$('lpwd').value;
  const err=$('lerr');
  if(!email||!pwd){ err.textContent='Inserisci email e password.'; err.style.display='block'; return; }
  const btn=$('lbtn-login'); btn.textContent='Accesso...'; btn.disabled=true;
  try {
    const data = await supaAuth(email, pwd);
    if(data.error){ err.textContent=data.error_description||data.error; err.style.display='block'; return; }
    S.token=data.access_token; S.user={email:data.user.email, id:data.user.id};
    try {
      const p = await db('GET',T('profili'),{flt:`id=eq.${data.user.id}`});
      if(p&&p.length){ S.ruolo=p[0].ruolo; S.user.nome=p[0].nome; S.user.cognome=p[0].cognome; }
      else { S.ruolo='viewer'; S.user.nome=email.split('@')[0]; S.user.cognome=''; }
    } catch(e){ S.ruolo='viewer'; }
    await initApp();
  } catch(e){ err.textContent='Errore di connessione.'; err.style.display='block'; }
  finally { btn.textContent='Accedi'; btn.disabled=false; }
}

function doLogout(){
  S.user=null; S.token=null; S.ruolo=null;
  $('app').style.display='none'; $('lp').style.display='flex';
  $('lemail').value=''; $('lpwd').value='';
}

async function initApp(){
  $('lp').style.display='none'; $('app').style.display='flex';
  $('tb-date').textContent = new Date().toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'long'});
  $('tb-user').textContent = `${S.user.nome||''} ${S.user.cognome||''}`.trim()||S.user.email;
  $('tb-role').textContent = S.ruolo||'viewer';
  document.querySelectorAll('.tnb').forEach(b => b.addEventListener('click',()=>goPage(b.dataset.page)));
  if(S.ruolo==='admin') { const tu=$('tnb-utenti'); if(tu) tu.style.display=''; }
  $('lout').addEventListener('click', doLogout);
  await loadAll();
  goPage('aziende');
  updateBadges();
}

async function loadAll(){
  try {
    const [az, ct, op, ax, sv] = await Promise.all([
      db('GET',T('aziende'),{ord:'ragione_sociale.asc'}).catch(()=>[]),
      db('GET',T('contatti'),{ord:'cognome.asc'}).catch(()=>[]),
      db('GET',T('operazioni'),{ord:'data_operazione.desc'}).catch(()=>[]),
      db('GET',T('prossime_azioni'),{ord:'data_scadenza.asc'}).catch(()=>[]),
      db('GET',T('settings'),{}).catch(()=>[]),
    ]);
    S.aziende=az||[]; S.contatti=ct||[]; S.operazioni=op||[]; S.azioni=ax||[];
    S.settings={}; (sv||[]).forEach(r=>{ S.settings[r.chiave]=r.valore; });
    try { S.profili=await db('GET',T('profili'),{ord:'cognome.asc'})||[]; } catch(e){ S.profili=[]; }
  } catch(e){ toast('Errore caricamento dati','err'); }
}

function updateBadges(){
  const oggi = new Date().toISOString().slice(0,10);
  const pending = S.azioni.filter(a => a.stato==='in_attesa' && a.data_scadenza<=oggi);
  const ba=$('badge-azioni');
  if(pending.length>0){ ba.textContent=pending.length; ba.style.display='inline'; }
  else ba.style.display='none';
}

function goPage(pg){
  S.page=pg;
  document.querySelectorAll('.tnb').forEach(b=>b.classList.toggle('active',b.dataset.page===pg));

function aziendeFiltered(){
  let list = S.aziende.filter(a=>{
    if(S.filtri.stato && a.stato_commerciale!==S.filtri.stato) return false;
    if(S.filtri.ateco && !(a.codice_ateco||'').startsWith(S.filtri.ateco)) return false;
    if(S.filtri.search){
      const q=S.filtri.search.toLowerCase();
      return (a.ragione_sociale||'').toLowerCase().includes(q)||
             (a.comune||'').toLowerCase().includes(q)||
             (a.partita_iva||'').includes(q);
    }
    return true;
  });
  const {campo,dir}=S.ordine;
  list.sort((a,b)=>{
    let va=a[campo]||'', vb=b[campo]||'';
    if(typeof va==='string') va=va.toLowerCase(), vb=vb.toLowerCase();
    if(va<vb) return dir==='asc'?-1:1;
    if(va>vb) return dir==='asc'?1:-1;
    return 0;
  });
  return list;
}

              <div class="ac-data">${scaduta?'⚠️ ':''}Scadenza: ${fmt(a.data_scadenza)}${ct?` · ${esc(ct.nome)} ${esc(ct.cognome||'')}`:''}</div>
              ${a.note?`<div class="ac-note">${esc(a.note)}</div>`:''}
              ${gestore?`<div style="font-size:11px;color:var(--txt-faint);margin-top:4px;">Gestore: ${esc(gestore.nome)} ${esc(gestore.cognome||'')}</div>`:''}

          <div class="card-title">Contatti & Web</div>

          ${renderKV('Comune',az.comune)}

          ${renderKV('Telefono',az.telefono)}
          ${renderKV('PEC',az.pec)}

          ${az.linkedin_url?`<div style="padding:6px 0;border-bottom:1px solid var(--ew-grigio-ghost);"><span style="font-size:11px;color:var(--txt-soft);text-transform:uppercase;font-weight:700;">LinkedIn</span><div style="margin-top:2px;"><a href="${esc(az.linkedin_url)}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:13px;">Profilo LinkedIn ↗</a></div></div>`:''}
          ${az.note?renderKV('Note',az.note):''}
          <div style="margin-top:12px;font-size:11px;color:var(--txt-faint);">Inserita il ${fmt(az.created_at)} · Aggiornata il ${fmt(az.updated_at)}</div>
        </div>
      </div>`;
    }
  };

  document.querySelectorAll('#modal-box .tab').forEach(t=>t.addEventListener('click',()=>showTab(t.dataset.tab)));
  showTab('timeline');

  // Bottoni footer
  if(S.ruolo==='admin'){
    if($('btn-nuova-op')) $('btn-nuova-op').addEventListener('click',()=>openNuovaOperazione(azId));
    if($('btn-nuovo-ct')) $('btn-nuovo-ct').addEventListener('click',()=>openAddContatto(azId));
    if($('btn-nuova-az-azione')) $('btn-nuova-az-azione').addEventListener('click',()=>openNuovaAzione(azId));
    if($('btn-edit-az')) $('btn-edit-az').addEventListener('click',()=>{ closeModal(); openEditAzienda(azId); });
    if($('btn-del-az')) $('btn-del-az').addEventListener('click',()=>delAzienda(azId));
    if($('sel-stato-az')) $('sel-stato-az').addEventListener('change',async e=>{
      try{
        await db('PATCH',T('aziende'),{flt:`id=eq.${azId}`,body:{stato_commerciale:e.target.value,updated_at:new Date().toISOString()}});
        const idx=S.aziende.findIndex(a=>a.id===azId);
        if(idx>=0) S.aziende[idx].stato_commerciale=e.target.value;
        toast('Stato aggiornato');
      }catch(err){toast('Errore: '+err.message,'err');}
    });
  }
  openModal();
}

function renderKV(label,val,type=''){
  if(!val&&val!==0) return '';
  return `<div style="padding:6px 0;border-bottom:1px solid var(--ew-grigio-ghost);">
    <span style="font-size:11px;color:var(--txt-soft);text-transform:uppercase;font-weight:700;">${esc(label)}</span>
    <div style="margin-top:2px;font-size:13px;color:var(--txt);${type==='mono'?'font-family:DM Mono,monospace;':''}">${esc(String(val))}</div>
  </div>`;
}

function openAddAzienda(){
  $('modal-title').textContent='Nuova Azienda';
  $('modal-box').className='modal modal-lg';
  $('modal-body').innerHTML=formAzienda({});
  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="btn-save-az">Aggiungi</button>';
  $('btn-save-az').addEventListener('click',()=>saveAzienda(null));
  openModal();
}

function openEditAzienda(azId){
  const az=S.aziende.find(x=>x.id===azId); if(!az) return;
  $('modal-title').textContent='Modifica Azienda';
  $('modal-box').className='modal modal-lg';
  $('modal-body').innerHTML=formAzienda(az);
  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="btn-save-az">Salva</button>';
  $('btn-save-az').addEventListener('click',()=>saveAzienda(azId));
  openModal();
}

function formAzienda(az){
  return `

    <div class="frow three"><div class="fgroup"><label>Codice ATECO</label><input id="az-ateco" class="fi" style="font-family:'DM Mono',monospace;" value="${esc(az.codice_ateco||'')}"/></div><div class="fgroup"><label>Desc. ATECO</label><input id="az-dateco" class="fi" value="${esc(az.descrizione_ateco||'')}"/></div><div class="fgroup"><label>Forma Giuridica</label><input id="az-fgiur" class="fi" value="${esc(az.forma_giuridica||'')}"/></div></div>
    <div class="frow"><div class="fgroup"><label>Fatturato (€)</label><input type="number" id="az-fatt" class="fi" value="${az.fatturato_valore||''}"/></div><div class="fgroup"><label>Anno Bilancio</label><input type="number" id="az-abilan" class="fi" value="${az.anno_bilancio||''}"/></div></div>
    <div class="frow three"><div class="fgroup"><label>Comune</label><input id="az-comune" class="fi" value="${esc(az.comune||'')}"/></div><div class="fgroup"><label>Provincia</label><input id="az-prov" class="fi" maxlength="3" style="text-transform:uppercase;" value="${esc(az.provincia||'')}"/></div><div class="fgroup"><label>CAP</label><input id="az-cap" class="fi" maxlength="5" style="font-family:'DM Mono',monospace;" value="${esc(az.cap||'')}"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Indirizzo</label><input id="az-ind" class="fi" value="${esc(az.indirizzo||'')}"/></div></div>
    <div class="frow"><div class="fgroup"><label>Sito Web</label><input id="az-web" class="fi" placeholder="https://..." value="${esc(az.sito_web||'')}"/></div><div class="fgroup"><label>LinkedIn</label><input id="az-li" class="fi" placeholder="https://linkedin.com/company/..." value="${esc(az.linkedin_url||'')}"/></div></div>
    <div class="frow"><div class="fgroup"><label>Telefono</label><input id="az-tel" class="fi" value="${esc(az.telefono||'')}"/></div><div class="fgroup"><label>PEC</label><input id="az-pec" class="fi" value="${esc(az.pec||'')}"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Stato Commerciale</label><select id="az-stato" class="fse">
      <option value="prospect" ${(az.stato_commerciale||'prospect')==='prospect'?'selected':''}>Prospect</option>
      <option value="in_trattativa" ${az.stato_commerciale==='in_trattativa'?'selected':''}>In Trattativa</option>
      <option value="cliente" ${az.stato_commerciale==='cliente'?'selected':''}>Cliente</option>
      <option value="perso" ${az.stato_commerciale==='perso'?'selected':''}>Perso</option>
      <option value="non_interessato" ${az.stato_commerciale==='non_interessato'?'selected':''}>Non Interessato</option>
    </select></div></div>
    <div class="frow full"><div class="fgroup"><label>Note</label><textarea id="az-note" class="fta">${esc(az.note||'')}</textarea></div></div>`;
}

async function saveAzienda(azId){
  const rs=$('az-rs').value.trim(); if(!rs){ toast('Ragione sociale obbligatoria','warn'); return; }
  const body={
    ragione_sociale:rs,
    partita_iva:$('az-piva').value.trim()||null,
    codice_ateco:$('az-ateco').value.trim()||null,
    descrizione_ateco:$('az-dateco').value.trim()||null,
    fatturato_valore:parseFloat($('az-fatt').value)||null,
    anno_bilancio:parseInt($('az-abilan').value)||null,
    comune:$('az-comune').value.trim()||null,
    provincia:($('az-prov').value.trim().toUpperCase())||null,
    cap:$('az-cap').value.trim()||null,
    indirizzo:$('az-ind').value.trim()||null,
    sito_web:$('az-web').value.trim()||null,
    linkedin_url:$('az-li').value.trim()||null,
    telefono:$('az-tel').value.trim()||null,
    pec:$('az-pec').value.trim()||null,
    stato_commerciale:$('az-stato').value,
    nota:$('az-note').value.trim()||null,
    inserito_manualmente:true,
    updated_at:new Date().toISOString(),
  };
  // Rimuovi nulls
  Object.keys(body).forEach(k=>{ if(body[k]===null) delete body[k]; });
  try{
    if(azId){
      await db('PATCH',T('aziende'),{flt:`id=eq.${azId}`,body});
      const i=S.aziende.findIndex(a=>a.id===azId);
      if(i>=0) S.aziende[i]={...S.aziende[i],...body};
      toast('Azienda aggiornata');
    } else {
      body.created_at=new Date().toISOString();
      const res=await db('POST',T('aziende'),{body});
      if(res&&res[0]) S.aziende.unshift(res[0]);
      toast('Azienda aggiunta');
    }
    closeModal();
    renderAziende($('pb'));
    updateBadges();
  }catch(e){ toast('Errore: '+e.message,'err'); }
}

async function delAzienda(azId){
  if(!confirm('Eliminare questa azienda e tutti i dati correlati?')) return;
  try{
    await db('DELETE',T('aziende'),{flt:`id=eq.${azId}`});
    S.aziende=S.aziende.filter(a=>a.id!==azId);
    S.contatti=S.contatti.filter(c=>c.azienda_id!==azId);
    S.operazioni=S.operazioni.filter(o=>o.azienda_id!==azId);
    S.azioni=S.azioni.filter(a=>a.azienda_id!==azId);
    toast('Azienda eliminata');
    closeModal();
    renderAziende($('pb'));
    updateBadges();
  }catch(e){ toast('Errore: '+e.message,'err'); }
}

function openCercaOpenapi(){
  $('modal-title').textContent='Cerca Aziende su Openapi.it';
  $('modal-box').className='modal';
  const hasKey=!!S.settings['openapi_key'];
  $('modal-body').innerHTML=`
    ${!hasKey?'<div class="warn-box">⚠️ Configura la chiave Openapi.it nelle Impostazioni prima di procedere.</div>':''}
    <div class="info-box">Cerca aziende italiane per codice ATECO e range di fatturato. I risultati vengono salvati automaticamente evitando duplicati per Partita IVA.</div>
    <div class="frow full"><div class="fgroup"><label>Codice ATECO *</label><input id="op-ateco" class="fi" placeholder="es. 62.01.00" style="font-family:'DM Mono',monospace;"/></div></div>
    <div class="frow">
      <div class="fgroup">
        <label>Fatturato minimo (Mln €)</label>
        <div style="position:relative;">
          <input type="number" id="op-fmin" class="fi" placeholder="es. 1.5" step="0.1" min="0" style="padding-right:44px;"/>
          <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--txt-soft);font-weight:600;pointer-events:none;">Mln</span>
        </div>
        <span style="font-size:11px;color:var(--txt-faint);">Lascia vuoto = nessun minimo</span>
      </div>
      <div class="fgroup">
        <label>Fatturato massimo (Mln €)</label>
        <div style="position:relative;">
          <input type="number" id="op-fmax" class="fi" placeholder="es. 10 — vuoto = illimitato" step="0.1" min="0" style="padding-right:44px;"/>
          <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--txt-soft);font-weight:600;pointer-events:none;">Mln</span>
        </div>
        <span style="font-size:11px;color:var(--txt-faint);">Lascia vuoto = nessun massimo (solo &gt; min)</span>
      </div>
    </div>
    <div id="op-preview" style="font-size:12px;color:var(--ew-verde-dark);font-weight:600;margin:-6px 0 14px;padding:8px 12px;background:var(--ew-verde-ghost);border-radius:var(--rsm);display:none;"></div>
    <div class="frow"><div class="fgroup"><label>Comune (opzionale)</label><input id="op-comune" class="fi" placeholder="es. Milano"/></div><div class="fgroup"><label>Provincia (opzionale)</label><input id="op-prov" class="fi" maxlength="3" style="text-transform:uppercase;" placeholder="es. MI"/></div></div>`;

  // Preview filtro fatturato in tempo reale
  const aggiornaPrev=()=>{
    const mn=parseFloat($('op-fmin').value.replace(',','.'));
    const mx=parseFloat($('op-fmax').value.replace(',','.'));
    const prev=$('op-preview');
    if(!isNaN(mn)||!isNaN(mx)){
      const f=v=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v*1_000_000);
      let txt='Filtro: ';
      if(!isNaN(mn)&&!isNaN(mx)) txt+=`fatturato tra ${f(mn)} e ${f(mx)}`;
      else if(!isNaN(mn))         txt+=`fatturato > ${f(mn)}`;
      else                        txt+=`fatturato < ${f(mx)}`;
      prev.textContent=txt; prev.style.display='block';
    } else { prev.style.display='none'; }
  };
  // Usa setTimeout per attendere che il DOM sia pronto
  setTimeout(()=>{
    $('op-fmin').addEventListener('input',aggiornaPrev);
    $('op-fmax').addEventListener('input',aggiornaPrev);
  },0);

  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="op-avvia">🔍 Avvia ricerca</button>';
  $('op-avvia').addEventListener('click',async()=>{
    if(!S.settings['openapi_key']){ toast('Configura la chiave Openapi.it nelle Impostazioni','warn'); return; }
    const ateco=$('op-ateco').value.trim(); if(!ateco){ toast('Codice ATECO obbligatorio','warn'); return; }
    // Leggi i valori in milioni e converti in euro (accetta sia virgola che punto)
    const fminRaw=$('op-fmin').value.replace(',','.');
    const fmaxRaw=$('op-fmax').value.replace(',','.');
    const fminMln=parseFloat(fminRaw);
    const fmaxMln=parseFloat(fmaxRaw);
    const fatturato_min=!isNaN(fminMln) ? Math.round(fminMln*1_000_000) : null;
    const fatturato_max=!isNaN(fmaxMln) ? Math.round(fmaxMln*1_000_000) : null;
    // Validazione: se max < min
    if(fatturato_min!==null&&fatturato_max!==null&&fatturato_max<fatturato_min){
      toast('Il massimo non può essere inferiore al minimo','warn'); return;
    }
    const btn=$('op-avvia'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Ricerca in corso...';
    try{
      const data=await callFn('crm-cerca-prospect',{
        codice_ateco:ateco,
        fatturato_min,
        fatturato_max,
        comune:$('op-comune').value.trim()||null,
        provincia:$('op-prov').value.trim().toUpperCase()||null,
        openapi_key:S.settings['openapi_key']
      });
      if(data.ok){
        toast(`Trovate ${data.trovati} aziende: ${data.nuovi} nuove, ${data.duplicati} già presenti`);
        await loadAll();
        closeModal();
        renderAziende($('pb'));
      } else {
        console.error('Errore crm-cerca-prospect:', data);
        toast('Errore: '+(data.error||'sconosciuto'),'err');
      }
    }catch(e){ toast('Errore Edge Function: '+e.message,'err'); }
    btn.disabled=false; btn.innerHTML='🔍 Avvia ricerca';
  });
  openModal();
}

function openNuovaOperazione(azId){
  const contatti=S.contatti.filter(c=>c.azienda_id===azId);
  $('modal-title').textContent='Nuova Operazione';
  $('modal-box').className='modal';
  $('modal-body').innerHTML=`
    <div class="frow full"><div class="fgroup"><label>Tipo Operazione *</label><select id="op-tipo" class="fse">
      <option>Email inviata</option><option>Email ricevuta</option><option>Telefonata</option><option>Incontro</option><option>Nota commerciale</option><option>Preventivo inviato</option><option>Offerta accettata</option>
    </select></div></div>
    ${contatti.length?`<div class="frow full"><div class="fgroup"><label>Contatto (opzionale)</label><select id="op-ct" class="fse"><option value="">— Nessun contatto specifico —</option>${contatti.map(c=>`<option value="${c.id}">${esc(c.nome)} ${esc(c.cognome||'')}${c.ruolo_aziendale?' — '+esc(c.ruolo_aziendale):''}</option>`).join('')}</select></div></div>`:''}
    <div class="frow full"><div class="fgroup"><label>Data *</label><input type="datetime-local" id="op-data" class="fi" value="${new Date().toISOString().slice(0,16)}"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Dettagli</label><textarea id="op-det" class="fta" placeholder="Descrizione dell'operazione..."></textarea></div></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="op-save">Salva</button>';
  $('op-save').addEventListener('click',async()=>{
    const tipo=$('op-tipo').value;
    const data=$('op-data').value; if(!data){ toast('Data obbligatoria','warn'); return; }
    try{

async function saveContatto(ctId, azId){
  const nome=$('ct-nome').value.trim(); if(!nome){ toast('Nome obbligatorio','warn'); return; }
  const body={
    azienda_id:azId,
    nome, cognome:$('ct-cog').value.trim()||null,
    ruolo_aziendale:$('ct-ruolo').value.trim()||null,
    email:$('ct-email').value.trim()||null,
    telefono_diretto:$('ct-tel').value.trim()||null,
    linkedin_personale:$('ct-li').value.trim()||null,
    note:$('ct-note').value.trim()||null,
    updated_at:new Date().toISOString(),
  };
  try{
    if(ctId){
      await db('PATCH',T('contatti'),{flt:`id=eq.${ctId}`,body});
      const i=S.contatti.findIndex(c=>c.id===ctId);
      if(i>=0) S.contatti[i]={...S.contatti[i],...body};
      toast('Contatto aggiornato');
    } else {
      body.created_at=new Date().toISOString();
      const res=await db('POST',T('contatti'),{body});
      if(res&&res[0]) S.contatti.push(res[0]);
      toast('Contatto aggiunto');
    }
    closeModal();
    openScheda(azId);
  }catch(e){ toast('Errore: '+e.message,'err'); }
}

// ═══════════════════════════════════════════════════════
async function cercaEmailHunter(ctId, azId){
  if(!S.settings['hunter_key']){ toast('Configura Hunter.io API Key nelle Impostazioni','warn'); return; }
  const ct=S.contatti.find(c=>c.id===ctId); if(!ct) return;
  const az=S.aziende.find(a=>a.id===azId); if(!az) return;
  if(!az.sito_web){ toast("Azienda senza sito web — impossibile cercare con Hunter",'warn'); return; }
  toast('Ricerca Hunter.io in corso...');
  const domain=az.sito_web.replace(/https?:\/\//,'').replace(/\/.*/,'');
  try{
    const res=await fetch(`https://api.hunter.io/v2/email-finder?domain=${domain}&first_name=${encodeURIComponent(ct.nome||'')}&last_name=${encodeURIComponent(ct.cognome||'')}&api_key=${S.settings['hunter_key']}`);
    const data=await res.json();
    if(data.data&&data.data.email){
      const email=data.data.email;
      if(confirm(`Trovata email: ${email}\n\nVuoi salvarla per questo contatto?`)){
        await db('PATCH',T('contatti'),{flt:`id=eq.${ctId}`,body:{email,updated_at:new Date().toISOString()}});
        const i=S.contatti.findIndex(c=>c.id===ctId);
        if(i>=0) S.contatti[i].email=email;
        toast('Email salvata ✓');
        closeModal(); openScheda(azId);
      }
    } else {
      toast('Nessuna email trovata per questo contatto','warn');
    }
  }catch(e){ toast('Errore Hunter.io: '+e.message,'err'); }
}

    <div class="frow"><div class="fgroup"><label>Password *</label><input type="password" id="u-pwd" class="fi" placeholder="min. 6 caratteri"/></div>
    <div class="fgroup"><label>Ruolo</label><select id="u-ruolo" class="fse"><option value="viewer">Viewer</option><option value="admin">Admin</option></select></div></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="u-save">Crea Utente</button>';
  $('u-save').addEventListener('click',async()=>{
    const nome=$('u-nome').value.trim(),cog=$('u-cog').value.trim(),email=$('u-email').value.trim(),pwd=$('u-pwd').value,ruolo=$('u-ruolo').value;
    if(!nome||!cog||!email||!pwd){ toast('Tutti i campi sono obbligatori','warn'); return; }
    try{
      const data=await callFn('crm-manage-user',{action:'create',email,password:pwd,nome,cognome:cog,ruolo});
      if(!data.ok){ toast('Errore: '+data.error,'err'); return; }
      await loadAll(); toast('Utente creato'); closeModal(); renderUtenti($('pb'));
    }catch(e){ toast('Errore: '+e.message,'err'); }
  });
  openModal();
}

function openEditUser(uid){
  const u=S.profili.find(x=>x.id===uid); if(!u) return;
  $('modal-title').textContent='Modifica Utente';
  $('modal-box').className='modal';
  $('modal-body').innerHTML=`
    <div class="frow"><div class="fgroup"><label>Nome</label><input id="u-nome" class="fi" value="${esc(u.nome||'')}"/></div><div class="fgroup"><label>Cognome</label><input id="u-cog" class="fi" value="${esc(u.cognome||'')}"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Email (sola lettura)</label><input class="fi" value="${esc(u.email)}" readonly style="background:var(--ew-grigio-ghost);"/></div></div>
    <div class="frow"><div class="fgroup"><label>Ruolo</label><select id="u-ruolo" class="fse"><option value="viewer" ${u.ruolo==='viewer'?'selected':''}>Viewer</option><option value="admin" ${u.ruolo==='admin'?'selected':''}>Admin</option></select></div>
    <div class="fgroup"><label>Stato</label><select id="u-attivo" class="fse"><option value="true" ${u.attivo?'selected':''}>Attivo</option><option value="false" ${!u.attivo?'selected':''}>Disabilitato</option></select></div></div>
    <div class="frow full"><div class="fgroup"><label>Nuova Password (lascia vuoto per non cambiare)</label><input type="password" id="u-pwd" class="fi" placeholder="min. 6 caratteri"/></div></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" onclick="closeModal()">Annulla</button><button class="btn btn-primary" id="u-save">Salva</button>';
  $('u-save').addEventListener('click',async()=>{
    const payload={action:'update',user_id:uid,nome:$('u-nome').value.trim(),cognome:$('u-cog').value.trim(),ruolo:$('u-ruolo').value,attivo:$('u-attivo').value==='true'};
    if($('u-pwd').value) payload.password=$('u-pwd').value;
    try{
      const data=await callFn('crm-manage-user',payload);
      if(!data.ok){ toast('Errore: '+data.error,'err'); return; }
      await loadAll(); toast('Utente aggiornato'); closeModal(); renderUtenti($('pb'));
    }catch(e){ toast('Errore: '+e.message,'err'); }
  });
  openModal();
}

async function delUser(uid){
  if(!confirm('Eliminare il profilo utente? L\'account auth non sarà eliminato.')) return;
  try{
    const data=await callFn('crm-manage-user',{action:'delete_profile',user_id:uid});
    if(!data.ok){ toast('Errore: '+data.error,'err'); return; }
    S.profili=S.profili.filter(p=>p.id!==uid);
    toast('Utente rimosso'); renderUtenti($('pb'));
  }catch(e){ toast('Errore: '+e.message,'err'); }
}
</script>
</body>
